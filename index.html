<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Semana 04 - Equipo X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#">ArqWeb Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Arquitecturas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <strong>¡Aviso de CI!</strong> Este sitio se despliega mediante Integración Continua.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <img src="img/arquitectura.jpg" class="card-img-top" alt="Imagen de arquitectura">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Arquitectura Hexagonal</h5>
                        <p class="card-text">Permite aislar la lógica de negocio de factores externos, facilitando el mantenimiento.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm p-4">
                    <h3>Consulta Técnica</h3>
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com">
                        </div>
                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Duda sobre Microservicios</label>
                            <textarea class="form-control" id="mensaje" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar Consulta</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-muted border-top bg-white mt-5">
        <p>Laboratorio Contenidos Semana 04 | Grupo de 5 Integrantes</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
